name: Auto PR for Laravel Changes
on:
  push:
    branches: [ main ]  # Trigger on main pushes
    paths: [ 'app/**', 'routes/**' ]  # Laravel changes only

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup PHP 8.3
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
    - name: Cache Composer  # ✅ Fixed
      uses: actions/cache@v4
      with:
        path: vendor
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
    - run: composer install --no-progress  # Uses cache!
    - run: php artisan test

